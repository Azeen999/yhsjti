<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>永恒世界 · 角色羁绊测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --black: #111111;
      --gray-1: #f5f5f5;
      --gray-2: #e8e8e8;
      --gray-3: #aaaaaa;
      --white: #ffffff;
      --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--font);
      min-height: 100vh;
      max-width: 390px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ═══ 封面页 ═══ */
    #page-cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      text-align: center;
      gap: 28px;
    }

    .cover-title-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .cover-logo {
      width: 200px; height: 100px;
      background: var(--gray-1); border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: -8px;
    }
    .cover-logo img { width: 100%; height: 200%; object-fit: contain; border-radius: 18px; }
S
    .cover-title { font-size: 16px; font-weight: 300; letter-spacing: 0.5px; line-height: 0.5px; }
    .cover-subtitle { font-size: 22px; color: var(--black); font-weight: 800; }

    .cover-desc { font-size: 14px; color: #555; line-height: 1.7; max-width: 280px; }

    .cover-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .tag { padding: 4px 10px; background: var(--gray-1); border-radius: 20px; font-size: 11px; color: var(--gray-3); }

    .cover-scroll {
      width: 100%; overflow: hidden; padding: 8px 0;
    }
    .cover-scroll .scroll-track {
      display: flex; flex-direction: row; gap: 10px;
      width: max-content; animation: scroll-left 20s linear infinite;
    }
    .cover-scroll .scroll-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .cover-scroll .scroll-item img {
      width: 70px; height: 70px; object-fit: cover;
      border-radius: 16px; border: 2px solid var(--gray-2);
    }
    .cover-scroll .scroll-item span {
      font-size: 11px; color: var(--gray-3); font-weight: 500;
    }
    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .btn-start {
      width: 100%; max-width: 280px; height: 52px;
      background: var(--black); color: var(--white); border: none;
      border-radius: 14px; font-size: 15px; font-weight: 700;
      font-family: var(--font); cursor: pointer; transition: opacity 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-start:active { opacity: 0.7; }

    /* ═══ 题目页 ═══ */
    #page-quiz { min-height: 100vh; padding-bottom: 40px; }

    .quiz-header {
      padding: 14px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
    }

    .btn-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--gray-1); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; flex-shrink: 0;
    }

    .quiz-header-center {
      display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center;
    }

    .quiz-running-gif {
      width: 60px; height: 60px; object-fit: contain;
      position: absolute; top: 75%; transform: translateY(-50%) translateX(-50%);
      transition: left 0.4s ease; z-index: 2;
      left: 0;
    }

    .quiz-bubble {
      font-size: 12px; color: var(--gray-3); white-space: nowrap;
    }

    .quiz-counter { font-size: 13px; color: var(--gray-3); font-weight: 500; flex-shrink: 0; }

    .progress-wrap {
      padding: 30px 30px 0;
      position: relative; height: 28px; display: flex; align-items: center;
    }
    .progress-track {
      height: 6px; background: var(--gray-2); border-radius: 2px;
      overflow: visible; width: 100%; position: relative;
    }
    .progress-fill {
      height: 100%; background: var(--black); border-radius: 2px;
      transition: width 0.4s ease; width: 0%;
    }

    .quiz-body { padding: 28px 24px 0; }

    .question-text { font-size: 18px; font-weight: 700; line-height: 1.5; letter-spacing: -0.3px; margin-bottom: 24px; }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .opt {
      padding: 15px 16px; border: 1.5px solid var(--gray-2);
      border-radius: 12px; font-size: 14px; line-height: 1.55;
      color: var(--black); background: var(--white); cursor: pointer;
      text-align: left; font-family: var(--font);
      display: flex; align-items: flex-start; gap: 12px;
      transition: all 0.15s;
    }

    .opt-key { font-size: 11px; color: var(--gray-3); font-weight: 700; min-width: 14px; margin-top: 1px; letter-spacing: 0.5px; }

    .opt:active, .opt.selected { background: var(--black); border-color: var(--black); color: var(--white); }
    .opt.selected .opt-key { color: rgba(255,255,255,0.45); }

    .btn-next {
      margin: 24px 24px 0; width: calc(100% - 48px); height: 52px;
      background: var(--black); color: var(--white); border: none;
      border-radius: 14px; font-size: 15px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      transition: opacity 0.15s; opacity: 0.2; pointer-events: none;
    }
    .btn-next.enabled { opacity: 1; pointer-events: all; }
    .btn-next.enabled:active { opacity: 0.7; }

    /* ═══ 结果页 ═══ */
    #page-result { min-height: 100vh; padding-bottom: 60px; }

    .result-header {
      padding: 14px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; color: var(--gray-3);
    }

    .result-hero {
      padding: 40px 28px 28px;
      display: flex; gap: 24px; align-items: flex-start;
    }

    .result-left {
      flex: 1; display: flex; flex-direction: column; align-items: flex-start;
    }

    .result-mbti-label { font-size: 13px; color: var(--gray-3); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
    .result-label { font-size: 13px; color: var(--gray-3); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
    .result-mbti-type { font-size: 34px; font-weight: 800; letter-spacing: -1px; line-height: 1; margin-bottom: 10px; }
    .result-char-name { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .result-subname { font-size: 13px; color: var(--gray-3); margin-bottom: 0; }

    .result-right {
      display: flex; flex-direction: column; align-items: center;
    }

    .result-char-frame {
      width: 160px; height: 160px; background: var(--gray-1);
      border-radius: 28px; display: flex; align-items: center; justify-content: center;
      font-size: 60px; margin-bottom: 0; overflow: hidden;
    }

    .result-match-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--gray-1); border-radius: 12px; padding: 12px 16px;
      margin-bottom: 24px; width: 100%; max-width: 320px;
    }
    .match-icon { font-size: 22px; flex-shrink: 0; }
    .match-info { flex: 1; text-align: left; }
    .match-label { font-size: 12px; color: var(--gray-3); margin-bottom: 2px; }
    .match-name { font-size: 15px; font-weight: 700; }
    .match-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 10px; flex-shrink: 0; }
    .badge-green { background: #d4edda; color: #2e7d32; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-orange { background: #fff3cd; color: #b45309; }

    .result-quote { background: var(--gray-1); border-radius: 12px; padding: 14px 18px; margin: 0 24px 24px; font-size: 13px; line-height: 1.7; color: #555; text-align: left; }

    .traits { padding: 0 24px; margin-bottom: 24px; }
    .traits-title { font-size: 11px; color: var(--gray-3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .trait-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .trait-tag { padding: 5px 12px; background: var(--gray-1); border-radius: 20px; font-size: 12px; color: #555; }

    .divider { height: 1px; background: var(--gray-2); margin: 0 24px 24px; }

    .result-desc-wrap { padding: 0 24px; margin-bottom: 32px; margin-top: -20px; }
    .result-desc-title { font-size: 12px; color: var(--gray-3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .result-desc-text { font-size: 14px; line-height: 1.8; color: #444; }

    .result-actions { padding: 0 24px; display: flex; flex-direction: column; gap: 10px; }
    .btn-share { width: 100%; height: 48px; background: var(--black); color: var(--white); border: none; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: var(--font); cursor: pointer; }
    .btn-share:active { opacity: 0.7; }
    .btn-retry { width: 100%; height: 48px; background: var(--white); color: var(--black); border: 1.5px solid var(--gray-2); border-radius: 12px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; }
    .btn-retry:active { background: var(--gray-1); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ═══ 封面页 ═══ -->
  <div id="page-cover">
    <div class="cover-title-wrap">
      <div class="cover-logo"><img src="img/ETERNUM2.png" alt=""></div>

    <div class="cover-scroll">

    <button class="btn-start" onclick="startQuiz()">开始测试</button>

  <!-- ═══ 题目页 ═══ -->
  <div id="page-quiz" class="hidden">
    <div class="quiz-header">
      <button class="btn-back" onclick="goBack()">←</button>
      <div class="quiz-header-center">
        <span class="quiz-bubble" id="quiz-bubble">认真想哦～</span>
      </div>
      <span class="quiz-counter" id="quiz-counter">1 / 12</span>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <img class="quiz-running-gif" id="quiz-running-gif" src="img/跑动.gif" alt="">
    </div>
    <div class="quiz-body">
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options-container"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">继续 →</button>
  </div>

  <!-- ═══ 结果页 ═══ -->
  <div id="page-result" class="hidden">
    <div class="result-header">
      <span>永恒世界 · 羁绊测试</span>
      <span id="result-date"></span>
    </div>
    <div class="result-hero">
      <div class="result-left">
        <div class="result-mbti-label">你的MBTI</div>

    </div>
    <div class="result-actions">
      <button class="btn-share" onclick="shareResult()">分享结果</button>
      <button class="btn-retry" onclick="retryQuiz()">重新测试</button>
    </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    // 12道题目（来自试题.md，适配MBTI维度AB二选一）
    // E/I×3  N/S×3  F/T×4  J/P×2
    // ═══════════════════════════════════════════════════════════════════
    const questions = [
      {
        char: '🔥', bubble: '我们至今仍未知道烧烤味蛋白粉好不好喝',
        text: '达莉亚约你去新开的极限运动馆，面对高空项目，你的想法是？',
        options: [
          { key: 'A', text: '有点担心安全，会详细询问设施和教练资质，再做决定。', dim: 'S-J' },
          { key: 'B', text: '太棒了！立刻答应，享受挑战极限和肾上腺素飙升的快感。', dim: 'Se-P' },
          { key: 'C', text: '委婉拒绝，提议去海边散步或爬山，觉得那样更惬意。', dim: 'I-J' },
          { key: 'D', text: '虽然不太感兴趣，但为了陪她，愿意尝试一下。', dim: 'F-J' }
        ]
      },
      {
        char: '👑', bubble: '豆瓣上对永恒世界的分类是第一人称射击',
        text: '公主卡吕普索在一个普通的清晨，单独邀请你共进早餐。这略显突兀的邀请，你认为她的主要意图是：',
        options: [
          { key: 'A', text: '这可能是皇室某种惯例性社交，或她今日恰好需要个早餐伙伴。', dim: 'P' },
          { key: 'B', text: '她遇到了某些私人困扰，需要找一个绝对信任的人倾诉。', dim: 'Fi' },
          { key: 'C', text: '她对你有好感，想借这个私密机会多了解你。', dim: 'Si' },
          { key: 'D', text: '永恒世界中重要人物的变动可能对王国造成威胁，她需要你这股重要力量。', dim: 'S-T' }
        ]
      },
      {
        char: '🎋', bubble: '安妮9岁看小黄人和冰雪奇缘(2013),可能是04年人',
        text: '无意中发现安妮写满你心事的日记本，你会？',
        options: [
          { key: 'A', text: '放回原处，但心里感到很温暖，对她的感情更确定。', dim: 'Fi-J' },
          { key: 'B', text: '立刻合上放回，当作没看见，尊重隐私。', dim: 'T-J' },
          { key: 'C', text: '非常纠结，最终可能看一点，但之后会找机会询问。', dim: 'S' },
          { key: 'D', text: '心跳加速，忍不住小心翻阅，想了解更多。', dim: 'P' }
        ]
      },
      {
        char: '🌙', bubble: '球球Caribdis别突脸吓人了',
        text: '在弗林克那栋诡异的房子里，哪个场景最让你后背发凉？',
        options: [
          { key: 'A', text: '路灯下，那个哭泣的小女孩，毫无征兆地猛然回头看你。', dim: 'S' },
          { key: 'B', text: '四周一片寂静，只有墙上老挂钟发出诡异钟摆声。', dim: 'N' },
          { key: 'C', text: '眼前那条黝黑、深邃、仿佛没有尽头的走廊。', dim: 'N' },
          { key: 'D', text: '昏暗客厅里，突然响起的刺耳电话铃声。', dim: 'S' }
        ]
      },
      {
        char: '💎', bubble: '诺娃的眼罩是在左还是右？眼睛是什么颜色？',
        text: '诺娃的电脑在破解关键密码时突然蓝屏，数据可能丢失，她急哭了，你会？',
        options: [
          { key: 'A', text: '保持冷静，告诉她"别急，我们一起重新找，一定有办法"。', dim: 'F' },
          { key: 'B', text: '一边安抚，一边大脑飞速思考可能的解决方案。', dim: 'T-J' },
          { key: 'C', text: '开个玩笑缓解气氛："看来你的电脑也觉得这密码太难为人了。"', dim: 'Te-P' },
          { key: 'D', text: '知道自己可能帮不上忙，先抱住她安慰等她情绪稳定。', dim: 'F' }
        ]
      },
      {
        char: '🔥', bubble: '佩妮和达利亚小时候是双马尾，南希年轻时也是！',
        text: '格斗训练中被达莉亚击倒，她得意地笑，你会？',
        options: [
          { key: 'A', text: '迅速起身，眼神锐利，准备再战。', dim: 'T' },
          { key: 'B', text: '笑着认输，夸她进步真大。', dim: 'Fe' },
          { key: 'C', text: '假装受伤不起，逗她过来查看。', dim: 'N-P' },
          { key: 'D', text: '躺地上耍赖："刚才地滑，不算！"', dim: 'E-P' }
        ]
      },
      {
        char: '🌙', bubble: '那天露娜到底看到了什么？',
        text: '露娜突然一脸认真地问你"人类存在的意义是什么"，你正在吃东西，会怎么回答？',
        options: [
          { key: 'A', text: '停下动作，认真思考后给出一个自己认为合理的答案。', dim: 'I-T' },
          { key: 'B', text: '坦白自己不知道，并反问她："你觉得呢？我想听听你的。"', dim: 'N-P' },
          { key: 'C', text: '看着她，觉得她思考的样子很美，说："你的存在就是意义。"', dim: 'F' },
          { key: 'D', text: '觉得这问题太严肃了，笑着给她分享好吃的："为了这个！"', dim: 'S-P' }
        ]
      },
      {
        char: '💎', bubble: '餐厅里不要调戏服务员哦~发现安妮灰掉就晚了',
        text: '安妮邀请你第一次进入永恒世界。当你戴上设备，眼前景象稳定后，你首先注意到并最感兴趣的是：',
        options: [
          { key: 'A', text: '空间中流动的、构成一切基础的复杂数据代码和几何框架。', dim: 'N' },
          { key: 'B', text: '由光线与色彩构成的、令人屏息的绝美景观，仿佛置身童话。', dim: 'S' },
          { key: 'C', text: '一个漂浮在眼前的、需要解开的初始谜题，它似乎是探索的关键。', dim: 'N' },
          { key: 'D', text: '立刻开始尝试与各种物体互动，寻找隐藏的小游戏或趣味彩蛋。', dim: 'S' }
        ]
      },
      {

    let currentQ = 0;

    function startQuiz() {
      currentQ = 0; selectedDim = null;
      mbti = { E: 0, I: 0, N: 0, S: 0, F: 0, T: 0, J: 0, P: 0 };
      document.getElementById('page-cover').classList.add('hidden');
      document.getElementById('page-quiz').classList.remove('hidden');
      document.getElementById('page-result').classList.add('hidden');
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQ];
      const total = questions.length;
      document.getElementById('quiz-counter').textContent = `${currentQ + 1} / ${total}`;
      document.getElementById('progress-fill').style.width = `${(currentQ / total) * 100}%`;
      document.getElementById('quiz-bubble').textContent = q.bubble;
      // 定位跑动GIF到进度条最前端
      const wrap = document.getElementById('progress-wrap');
      const gif = document.getElementById('quiz-running-gif');
      const pct = currentQ / total;
      const wrapW = wrap.clientWidth;
      // 进度条有效宽度 = wrapWidth - 20px（左右各10px padding）
      gif.style.left = `${pct * (wrapW - 60) + 26}px`;
      document.getElementById('question-text').textContent = q.text;

      const container = document.getElementById('options-container');
      container.innerHTML = q.options.map(opt => `
        <button class="opt" data-dim="${opt.dim}" onclick="selectOpt(this, '${opt.dim}')">
          <span class="opt-key">${opt.key}</span>
          <span>${opt.text}</span>
        </button>
      `).join('');

      selectedDim = null;
      document.getElementById('btn-next').classList.remove('enabled');
      document.getElementById('btn-next').textContent = currentQ === total - 1 ? '查看结果 →' : '继续 →';
    }

    function selectOpt(el, dim) {
      document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedDim = dim;
      document.getElementById('btn-next').classList.add('enabled');
    }

    function nextQuestion() {
      if (!selectedDim) return;
      scoreDim(selectedDim);
      currentQ++;
      if (currentQ < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    // 计分规则：

    // 斜杠分隔：I/F, N/P → 各1票
    // 横杠分隔：S-J, F-J → 各1票
    // 认知功能前缀(小写)：Se-P → S=1,P=1 + e(偏向)=0.5；Fe-J → F=1,J=1 + e=0.5；Si-J → S=1,J=1 + i=0.5
    function scoreDim(dim) {
      const TENDENCY = ['e','i','n','s','f','t'];
      if (dim.includes('/')) {
        dim.split('/').forEach(d => { if (mbti[d] !== undefined) mbti[d] += 1; });
      } else if (dim.includes('-')) {
        // e.g. Se-P, Si-J, Fe-J, S-J
        const parts = dim.split('-');
        const prefix = parts[0]; // e.g. "Se", "Si", "Fe"
        const suffix = parts[1]; // e.g. "P", "J"
        const main = prefix[0]; // S, S, F
        const tend = prefix[1]; // e, i, e
        mbti[main] += 1;
        if (TENDENCY.includes(tend)) mbti[tend.toUpperCase()] += 0.5;
        if (mbti[suffix] !== undefined) mbti[suffix] += 1;
      } else {
        if (mbti[dim] !== undefined) mbti[dim] += 1;
      }
    }

    function calcMBTI() {
      const e = mbti.E >= mbti.I ? 'E' : 'I';
      const n = mbti.N >= mbti.S ? 'N' : 'S';
      const f = mbti.F >= mbti.T ? 'F' : 'T';
      const j = mbti.J >= mbti.P ? 'J' : 'P';
      return e + n + f + j;
    }

    function showResult() {
      document.getElementById('page-quiz').classList.add('hidden');
      document.getElementById('page-result').classList.remove('hidden');

      const type = calcMBTI();
      const match = matchTable[type] || matchTable['ISFJ'];
      const char = characters[match.char];

      document.getElementById('result-date').textContent = new Date().toLocaleDateString('zh-CN');
      // 左侧
      document.getElementById('result-mbti-type').textContent = type;
      document.getElementById('result-char-name').textContent = match.char;
      document.getElementById('result-subname').textContent = char.subname;
      // 右侧
      document.getElementById('result-char-frame').innerHTML = `<img src="img/${match.img}" alt="${match.char}" style="width:100%;height:100%;object-fit:cover;border-radius:28px;">`;

      document.getElementById('result-quote').innerHTML = `「${match.slogan}」`;
      document.getElementById('trait-list').innerHTML = char.traits.map(t => `<span class="trait-tag">${t}</span>`).join('');
      document.getElementById('result-desc-text').textContent = match.desc;
    }

    function retryQuiz() {
      document.getElementById('page-result').classList.add('hidden');
      document.getElementById('page-cover').classList.remove('hidden');
      currentQ = 0; selectedDim = null;
      mbti = { E: 0, I: 0, N: 0, S: 0, F: 0, T: 0, J: 0, P: 0 };
    }

    function goBack() {
      if (currentQ > 0) { currentQ--; showQuestion(); }
      else {
        document.getElementById('page-quiz').classList.add('hidden');
        document.getElementById('page-cover').classList.remove('hidden');
      }
    }

    function shareResult() {
      const type = calcMBTI();
      const match = matchTable[type] || matchTable['ISFJ'];
      const text = `我在永恒世界里测出了 ${type}，适配角色是 ${match.char}！⚔️ 「${match.slogan}」`;
      if (navigator.share) navigator.share({ title: '永恒世界角色羁绊测试', text });
      else navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板！'));
    }
  </script>
</body>
</html>
